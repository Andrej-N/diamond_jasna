<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <!-- Main diamond gradient: deep rose to blush pink -->
    <linearGradient id="diamondMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a7bb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9748d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a3506d;stop-opacity:1" />
    </linearGradient>
    <!-- Top facet highlight -->
    <linearGradient id="topFacet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f2a7bb;stop-opacity:1" />
    </linearGradient>
    <!-- Left facet -->
    <linearGradient id="leftFacet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8809a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9748d;stop-opacity:1" />
    </linearGradient>
    <!-- Right facet -->
    <linearGradient id="rightFacet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b05e7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8c3f5a;stop-opacity:1" />
    </linearGradient>
    <!-- Bottom facet -->
    <linearGradient id="bottomFacet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a3506d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a2e4a;stop-opacity:1" />
    </linearGradient>
    <!-- Gold shimmer gradient -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a96a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f0c97e;stop-opacity:0" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#c9748d" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- === DIAMOND SHAPE === -->
  <!-- The diamond: crown top (trapezoid) + pavilion bottom (inverted triangle) -->

  <!-- Crown – top belt (girdle line) -->
  <!-- Table (top flat face) -->
  <polygon points="50,12 70,30 50,35 30,30" fill="url(#topFacet)" filter="url(#shadow)" />

  <!-- Crown left facet -->
  <polygon points="30,30 50,35 15,55" fill="url(#leftFacet)" />

  <!-- Crown right facet -->
  <polygon points="70,30 85,55 50,35" fill="url(#rightFacet)" />

  <!-- Crown top-left bezel -->
  <polygon points="50,12 30,30 15,55" fill="url(#diamondMain)" opacity="0.9" />

  <!-- Crown top-right bezel -->
  <polygon points="50,12 70,30 85,55" fill="url(#diamondMain)" opacity="0.75" />

  <!-- Girdle (middle belt) -->
  <polygon points="15,55 30,30 50,35 70,30 85,55 50,35" fill="url(#diamondMain)" opacity="0.5"/>

  <!-- Pavilion left -->
  <polygon points="15,55 50,35 50,90" fill="url(#bottomFacet)" opacity="0.95"/>

  <!-- Pavilion right -->
  <polygon points="85,55 50,90 50,35" fill="url(#rightFacet)" opacity="0.85"/>

  <!-- Girdle highlight line -->
  <polyline points="15,55 50,35 85,55" fill="none" stroke="#fde8f0" stroke-width="0.8" opacity="0.6"/>

  <!-- Gold shimmer overlay on table -->
  <polygon points="50,12 70,30 50,35 30,30" fill="url(#goldShimmer)" />

  <!-- White sparkle top-left -->
  <circle cx="38" cy="22" r="2.5" fill="white" opacity="0.85"/>
  <line x1="38" y1="18" x2="38" y2="26" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="34" y1="22" x2="42" y2="22" stroke="white" stroke-width="0.8" opacity="0.6"/>

  <!-- Tiny sparkle right -->
  <circle cx="65" cy="27" r="1.5" fill="#f0c97e" opacity="0.9"/>
</svg>
